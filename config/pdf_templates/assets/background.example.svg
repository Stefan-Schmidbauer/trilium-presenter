<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="210mm"
   height="297mm"
   viewBox="0 0 793.7008 1122.5197"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Schöner heller Farbverlauf -->
    <linearGradient
       id="exampleLightGradient"
       x1="0%"
       y1="0%"
       x2="0%"
       y2="100%">
      <stop
         offset="0%"
         style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop
         offset="50%"
         style="stop-color:#f5f9fc;stop-opacity:1" />
      <stop
         offset="100%"
         style="stop-color:#e0f0f7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hintergrund mit Farbverlauf -->
  <rect
     width="793.7008"
     height="1122.5197"
     fill="url(#exampleLightGradient)" />

  <!-- Titel -->
  <text
     x="396.85"
     y="60"
     font-family="Arial, Helvetica, sans-serif"
     font-size="32"
     font-weight="bold"
     text-anchor="middle"
     fill="#2c5aa0">Trilium Notes Presenter</text>

  <text
     x="396.85"
     y="95"
     font-family="Arial, Helvetica, sans-serif"
     font-size="20"
     text-anchor="middle"
     fill="#5a7ba0">Example Background</text>
</svg>
