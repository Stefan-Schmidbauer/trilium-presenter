<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="1920"
   height="1080"
   viewBox="0 0 1920 1080"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Schöner heller Farbverlauf -->
    <linearGradient
       id="exampleTitleGradient"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="100%">
      <stop
         offset="0%"
         style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop
         offset="50%"
         style="stop-color:#f5f9fc;stop-opacity:1" />
      <stop
         offset="100%"
         style="stop-color:#e0f0f7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hintergrund mit Farbverlauf -->
  <rect
     width="1920"
     height="1080"
     fill="url(#exampleTitleGradient)" />

  <!-- Titel -->
  <text
     x="960"
     y="70"
     font-family="Arial, Helvetica, sans-serif"
     font-size="48"
     font-weight="bold"
     text-anchor="middle"
     fill="#2c5aa0">Trilium Notes Presenter - Title</text>
</svg>