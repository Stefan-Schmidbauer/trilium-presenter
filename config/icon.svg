<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Main presentation screen -->
  <rect x="8" y="12" width="32" height="18" rx="2" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Screen content - presentation slides indicator -->
  <rect x="10" y="14" width="8" height="6" rx="1" fill="#3b82f6" opacity="0.8"/>
  <rect x="20" y="14" width="8" height="6" rx="1" fill="#64748b" opacity="0.3"/>
  <rect x="30" y="14" width="8" height="6" rx="1" fill="#64748b" opacity="0.3"/>
  
  <!-- Content lines -->
  <line x1="10" y1="23" x2="28" y2="23" stroke="#64748b" stroke-width="1" opacity="0.6"/>
  <line x1="10" y1="25" x2="25" y2="25" stroke="#64748b" stroke-width="1" opacity="0.6"/>
  <line x1="10" y1="27" x2="30" y2="27" stroke="#64748b" stroke-width="1" opacity="0.6"/>
  
  <!-- PDF/Document indicator -->
  <rect x="32" y="20" width="8" height="10" rx="1" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>
  <text x="36" y="26.5" font-family="Arial, sans-serif" font-size="4" fill="white" font-weight="bold" text-anchor="middle">PDF</text>
  
  <!-- Stand/Base -->
  <rect x="22" y="30" width="4" height="6" fill="#64748b"/>
  <rect x="18" y="36" width="12" height="2" rx="1" fill="#64748b"/>
  
  <!-- Small accent dots for modern look -->
  <circle cx="38" cy="14" r="1.5" fill="#10b981"/>
  <circle cx="34" cy="16" r="1" fill="#f59e0b"/>
</svg>