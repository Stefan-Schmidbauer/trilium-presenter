# Quickstrap Installation Profiles Configuration for Trilium-Presenter

[metadata]
# Display name of the application
app_name = Trilium-Presenter

# Directory name under ~/.config/ for storing installation info
config_dir = trilium_presenter

# Command to start the application (venv is activated automatically by start.sh)
start_command = python3 main.py

# Message shown after successful installation
after_install = Start Trilium-Presenter with: ./start.sh


# Installation Profile

[profile:trilium]
name = Trilium-Presenter Installation
description = Complete installation with PDF and HTML presentation generation
features = trilium-presenter,pdf,html,markdown
python_requirements = quickstrap/requirements_python.txt
system_requirements = quickstrap/requirements_system.txt
post_install_scripts = quickstrap/scripts/setup_trilium_backgrounds.sh
